<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PacPlus Mockup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 1200px;
      overflow: hidden;
      background: linear-gradient(145deg, #0f1b35 0%, #1a2f5e 40%, #0d2348 70%, #0a1628 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* Decorative glows */
    body::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -80px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.18) 0%, transparent 70%);
      border-radius: 50%;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -60px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(99, 179, 237, 0.12) 0%, transparent 70%);
      border-radius: 50%;
    }

    .scene {
      position: relative;
      width: 1000px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Floating badge */
    .badge {
      position: absolute;
      bottom: 60px;
      left: -30px;
      background: white;
      border-radius: 16px;
      padding: 14px 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
      animation: float 4s ease-in-out infinite;
    }
    .badge-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #1e3a6e, #2563eb);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .badge-text {
      line-height: 1.3;
    }
    .badge-label {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-value {
      font-size: 15px;
      font-weight: 700;
      color: #0f172a;
    }

    /* Second floating badge */
    .badge2 {
      position: absolute;
      top: 70px;
      right: -20px;
      background: white;
      border-radius: 16px;
      padding: 14px 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
      animation: float 4s ease-in-out infinite 1.5s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    /* Browser window */
    .browser {
      width: 860px;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 60px 120px rgba(0, 0, 0, 0.55),
        0 20px 40px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255,255,255,0.08);
      transform: perspective(1000px) rotateY(-3deg) rotateX(2deg);
    }

    .browser-bar {
      background: #f1f3f5;
      padding: 11px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #e2e8f0;
    }

    .dots {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
    }
    .dot-red    { background: #ff5f57; }
    .dot-yellow { background: #febc2e; }
    .dot-green  { background: #28c840; }

    .url-bar {
      flex: 1;
      background: #e8ecef;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .url-bar::before {
      content: '🔒';
      font-size: 10px;
    }

    .browser-content {
      overflow: hidden;
      line-height: 0;
    }
    .browser-content img {
      width: 100%;
      display: block;
      object-fit: cover;
      height: 490px;
      object-position: top;
    }

    /* Grain overlay */
    .grain {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.35;
    }

    /* Tag chip */
    .chip {
      position: absolute;
      top: 80px;
      left: 50px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,0.9);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 7px 14px;
      border-radius: 999px;
    }

    .bottom-label {
      position: absolute;
      bottom: 80px;
      right: 50px;
      text-align: right;
    }
    .bottom-label h3 {
      color: white;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .bottom-label p {
      color: rgba(255,255,255,0.5);
      font-size: 13px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="grain"></div>

  <div class="chip">Micro SaaS · Épicerie en ligne</div>

  <div class="scene">
    <!-- Floating badge left -->
    <div class="badge">
      <div class="badge-icon">🛒</div>
      <div class="badge-text">
        <div class="badge-label">Épiceries intégrées</div>
        <div class="badge-value">Maxi + Costco</div>
      </div>
    </div>

    <!-- Floating badge right -->
    <div class="badge2">
      <div class="badge-icon" style="background: linear-gradient(135deg, #166534, #16a34a);">💰</div>
      <div class="badge-text">
        <div class="badge-label">Économies moyennes</div>
        <div class="badge-value">30% / commande</div>
      </div>
    </div>

    <!-- Browser mockup -->
    <div class="browser">
      <div class="browser-bar">
        <div class="dots">
          <div class="dot dot-red"></div>
          <div class="dot dot-yellow"></div>
          <div class="dot dot-green"></div>
        </div>
        <div class="url-bar">pacplus.ca</div>
      </div>
      <div class="browser-content">
        <img src="real3.png" alt="PacPlus" />
      </div>
    </div>
  </div>

  <div class="bottom-label">
    <h3>PacPlus</h3>
    <p>Division de la société Hammer inc.</p>
  </div>
</body>
</html>
